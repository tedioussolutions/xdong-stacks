# Local Homelab Stack
# Caddy + Homepage + Docker Socket Proxy + n8n
#
# Quick start:
#   cp .env.example .env
#   nano .env
#   docker compose up -d
#
# DNS setup required: map *.local to this machine's IP
#   Option A: Pi-hole/AdGuard Home — add wildcard DNS record
#   Option B: /etc/hosts — add entries for each service
#   See README.md for details
#
# Web UIs (after DNS configured):
#   Homepage:  http://homepage.local
#   n8n:       http://n8n.local

services:

  # ── Docker Socket Proxy: Filtered Docker API Access ─────────────────
  # Sits between Homepage and the Docker daemon — limits API surface area.
  # Read-only access: Homepage uses this to display container status.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    labels:
      - "xdong.stack=local-homelab"
      - "xdong.category=infrastructure"
      - "xdong.guide=https://xdong.sh/guides/local-homelab-caddy-homepage-n8n"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Read-only access (Homepage dashboard)
      - CONTAINERS=1
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
      - SERVICES=1
      - TASKS=1
      - VOLUMES=1
    networks:
      - proxy
    # No ports exposed — accessed internally via docker-socket-proxy:2375
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/_ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Caddy: Reverse Proxy & *.local Routing ──────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    labels:
      - "xdong.stack=local-homelab"
      - "xdong.category=infrastructure"
      - "xdong.guide=https://xdong.sh/guides/local-homelab-caddy-homepage-n8n"
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Homepage: Self-Hosted Dashboard ─────────────────────────────────
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    labels:
      - "xdong.stack=local-homelab"
      - "xdong.category=infrastructure"
      - "xdong.guide=https://xdong.sh/guides/local-homelab-caddy-homepage-n8n"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - ./homepage/config:/app/config
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── n8n: Workflow Automation ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    labels:
      - "xdong.stack=local-homelab"
      - "xdong.category=infrastructure"
      - "xdong.guide=https://xdong.sh/guides/local-homelab-caddy-homepage-n8n"
    environment:
      - N8N_HOST=${N8N_HOST:-n8n.local}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://n8n.local/}
      - GENERIC_TIMEZONE=${TZ:-America/Denver}
      - TZ=${TZ:-America/Denver}
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    name: proxy
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  n8n-data:
