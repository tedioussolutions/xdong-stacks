# Immich Stack
# Self-hosted photo and video backup — Google Photos alternative.
#
# Quick start:
#   cp .env.example .env
#   nano .env          # Set DB_PASSWORD at minimum
#   docker compose up -d
#
# Web UI: http://localhost:${IMMICH_PORT:-2283}
# First launch: create your admin account via the web UI.
#
# Services:
#   immich-server          — Main API + web UI
#   immich-machine-learning — Face recognition + CLIP smart search
#   immich-postgres        — pgvecto-rs (Postgres 16 + vector extension)
#   immich-redis           — Job queue and caching backend

services:

  # ── Immich Server: Main Application ─────────────────────────────────────────
  # Handles uploads, API requests, and serves the web UI.
  # DB_* env vars must match immich-postgres service configuration below.
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    labels:
      - "xdong.stack=immich"
      - "xdong.category=daily-apps"
    env_file: .env
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME:-immich}
      - REDIS_HOSTNAME=immich-redis
    volumes:
      # Upload library — set UPLOAD_LOCATION in .env to a host path with plenty of space
      - ${UPLOAD_LOCATION:-./library}:/usr/src/app/upload
    ports:
      - "${IMMICH_PORT:-2283}:2283"
    depends_on:
      immich-postgres:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:2283/api/server/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - immich-internal

  # ── Immich Machine Learning: Smart Search + Face Recognition ─────────────────
  # Runs CLIP embeddings (smart search) and facial recognition models.
  # Model cache is persisted in a named volume to avoid re-downloading on restart.
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    labels:
      - "xdong.stack=immich"
      - "xdong.category=daily-apps"
    volumes:
      - immich-model-cache:/cache
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3003/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - immich-internal

  # ── Postgres: Database with pgvecto-rs Extension ─────────────────────────────
  # Uses tensorchord/pgvecto-rs instead of vanilla Postgres because Immich requires
  # the pgvecto-rs extension for vector similarity search (smart search feature).
  # Do NOT substitute with a plain postgres image — the extension is required.
  immich-postgres:
    image: docker.io/tensorchord/pgvecto-rs:pg16-v0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    labels:
      - "xdong.stack=immich"
      - "xdong.category=daily-apps"
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_DB=${DB_DATABASE_NAME:-immich}
      # Required for pgvecto-rs to load the extension on startup
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - immich-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_DATABASE_NAME:-immich} -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - immich-internal

  # ── Redis: Job Queue and Cache ────────────────────────────────────────────────
  # Immich uses Redis (via BullMQ) for its background job queue system.
  # No authentication required for a local-only deployment.
  immich-redis:
    image: docker.io/redis:6.2-alpine
    container_name: immich-redis
    restart: unless-stopped
    labels:
      - "xdong.stack=immich"
      - "xdong.category=daily-apps"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - immich-internal

# =============================================================================
# Network — all services communicate internally; only immich-server is exposed
# =============================================================================
networks:
  immich-internal:
    name: immich-internal
    driver: bridge

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  immich-postgres-data:
  immich-model-cache:
