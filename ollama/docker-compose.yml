# Ollama + Open WebUI Stack
# Local LLM inference server with a browser-based chat interface.
#
# Quick start:
#   cp .env.example .env
#   nano .env          # Adjust ports and timezone as needed
#   docker compose up -d
#
# Web UI:  http://localhost:${WEBUI_PORT:-3000}
# API:     http://localhost:${OLLAMA_PORT:-11434}
#
# GPU: See the commented-out "deploy" block under the ollama service.
#      Requires NVIDIA Container Toolkit — see README.md for setup.

services:

  # ── Ollama: Local LLM Inference Engine ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    labels:
      - "xdong.stack=ollama"
      - "xdong.category=ai-local"
    volumes:
      - ollama-data:/root/.ollama
      # Uncomment to use an external model directory instead of the named volume:
      # - ${OLLAMA_MODELS:-/srv/ollama/models}:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    networks:
      - ollama-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:11434 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    # ── GPU passthrough (NVIDIA) ─────────────────────────────────────────
    # Requires: NVIDIA Container Toolkit installed on the host.
    # Install: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    # Then uncomment the block below and run:  docker compose up -d
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all          # Use "1" to limit to a single GPU
    #           capabilities: [gpu]

  # ── Open WebUI: Browser-based Chat Interface ─────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    labels:
      - "xdong.stack=ollama"
      - "xdong.category=ai-local"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    networks:
      - ollama-net
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  ollama-net:
    driver: bridge

volumes:
  ollama-data:
  open-webui-data:
