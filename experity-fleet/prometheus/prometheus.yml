# Prometheus configuration for Experity fleet monitoring
# Scrapes Windows Exporter endpoints and self-metrics

global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Windows fleet via file-based service discovery
  # Edit file_sd/windows-fleet.json to add/remove machines
  - job_name: windows-fleet
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/windows-fleet.json
        refresh_interval: 60s
    scrape_interval: 60s
    scrape_timeout: 15s
    metrics_path: /metrics
