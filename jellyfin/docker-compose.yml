# Jellyfin Media Server Stack
# Quick start: cp .env.example .env && nano .env && docker compose up -d
# Web UI: http://localhost:${JELLYFIN_PORT:-8096}

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    labels:
      - "xdong.stack=jellyfin"
      - "xdong.category=daily-apps"
      - "xdong.guide=https://xdong.sh/guides/media-server"
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL:-http://localhost:8096}
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_PATH:-/srv/media}:/media:ro
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  jellyfin-config:
  jellyfin-cache:
