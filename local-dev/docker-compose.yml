# =============================================================================
# local-dev Stack
# =============================================================================
# A fully-featured self-hosted local development environment.
# All services share the local-dev-net bridge network and a single Postgres
# instance (with per-service logical databases).
#
# Quick start:
#   cp .env.example .env
#   nano .env          # set all passwords and secrets (see .env.example for
#                      # secret generation commands)
#   docker compose up -d
#
# Service URLs (no DNS required — direct localhost port access):
#   Homepage:       http://localhost:3000   (dashboard)
#   Code-Server:    http://localhost:8443   (VS Code in browser)
#   Forgejo:        http://localhost:3001   (self-hosted Git)
#   Forgejo SSH:    ssh://localhost:2222
#   Qdrant:         http://localhost:6333   (vector database REST API)
#   Qdrant gRPC:    grpc://localhost:6334
#   Meilisearch:    http://localhost:7700   (search engine)
#   n8n:            http://localhost:5678   (workflow automation)
#   Dozzle:         http://localhost:8080   (Docker log viewer)
#   Bytebase:       http://localhost:8888   (database DevOps)
#   Open WebUI:     http://localhost:8081   (AI chat / Ollama frontend)
#   Activepieces:   http://localhost:8082   (automation platform)
#   CyberChef:      http://localhost:8083   (data encoding/decoding tools)
#   AnythingLLM:    http://localhost:3500   (LLM workspace)
#
# Subdomain routing (optional — requires Caddy + DNS):
#   home.local.dev, code.local.dev, git.local.dev, n8n.local.dev, ...
#   See Caddyfile for details.
#
# =============================================================================

# =============================================================================
# SAMPLE .env VARIABLES (copy .env.example → .env and edit):
#
#   TZ=America/Denver
#   PUID=1000 / PGID=1000
#   POSTGRES_USER=postgres
#   POSTGRES_PASSWORD=change-me-postgres
#   FORGEJO_DB_PASSWORD=change-me-forgejo
#   N8N_DB_PASSWORD=change-me-n8n
#   BYTEBASE_DB_PASSWORD=change-me-bytebase
#   ACTIVEPIECES_DB_PASSWORD=change-me-activepieces
#   CODE_SERVER_PASSWORD=change-me-code-server
#   MEILI_MASTER_KEY=<openssl rand -hex 16>
#   QDRANT_API_KEY=                         (empty = no auth)
#   N8N_HOST=localhost
#   N8N_WEBHOOK_URL=http://localhost:5678
#   OLLAMA_BASE_URL=http://host.docker.internal:11434
#   OPEN_WEBUI_SECRET_KEY=<openssl rand -hex 32>
#   AP_ENCRYPTION_KEY=<openssl rand -hex 16>     (exactly 32 hex chars)
#   AP_JWT_SECRET=<openssl rand -hex 16>         (exactly 32 hex chars)
#   ANYTHINGLLM_JWT_SECRET=<openssl rand -base64 32>
#   ANYTHINGLLM_PASSWORD=change-me-anythingllm-password
#   CADDY_HTTP_PORT=80                       (optional — default 80)
# =============================================================================

services:

# ── Caddy: Reverse Proxy & *.local.dev Routing ────────────────────────────────
# Optional — only needed if you want subdomain-based access instead of direct ports.
# Requires DNS setup: map *.local.dev to this machine's IP (see Caddyfile header).
  caddy:
    image: caddy:2-alpine
    container_name: local-dev-caddy
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - local-dev-net

# ── Postgres: Shared Database Instance ───────────────────────────────────────
# A single Postgres 16 instance serves multiple services. Each service gets
# its own logical database and user, created by the initdb SQL script at
# postgres/init/01-create-databases.sql (runs once on first volume init).
# Services connect using their own user credentials — not the superuser.
  postgres:
    image: postgres:16-alpine
    container_name: local-dev-postgres
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # initdb scripts run once on first start (when data dir is empty)
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - local-dev-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No host ports — accessible only within local-dev-net
    # Services connect via: postgres://user:pass@postgres:5432/dbname

# ── Redis: Caching + Session Backend ─────────────────────────────────────────
# Shared Redis instance used by Forgejo (cache/sessions) and Activepieces.
# AOF persistence enabled so data survives container restarts.
  redis:
    image: redis:7-alpine
    container_name: local-dev-redis
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - local-dev-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # No host ports — accessible only within local-dev-net

# ── Homepage: Dashboard ───────────────────────────────────────────────────────
# Central dashboard with service tiles pointing to all other services.
# Reads docker.sock directly (read-only) for container status integration.
# For added security, replace with a docker-socket-proxy if desired.
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: local-dev-homepage
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "3000:3000"   # http://localhost:3000
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - local-dev-net

# ── Code-Server: VS Code in the Browser ─────────────────────────────────────
# Full VS Code experience in the browser. The linuxserver image supports
# PUID/PGID for correct file ownership on the mounted workspace volume.
# PASSWORD env var sets the browser auth password.
  code-server:
    image: linuxserver/code-server:latest
    container_name: local-dev-code-server
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "8443:8443"   # http://localhost:8443
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
      - PASSWORD=${CODE_SERVER_PASSWORD}
      # Uncomment to enable sudo inside the VS Code terminal:
      # - SUDO_PASSWORD=${CODE_SERVER_SUDO_PASSWORD}
    volumes:
      - code-server-data:/config   # workspace, extensions, settings
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8443"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - local-dev-net

# ── Forgejo: Self-Hosted Git Service ─────────────────────────────────────────
# Gitea-compatible Git host. Uses Postgres for the database and Redis for
# caching and session storage (configured via FORGEJO__ env var convention —
# each double underscore maps to a section/key in app.ini).
  forgejo:
    image: codeberg.org/forgejo/forgejo:11
    container_name: local-dev-forgejo
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "3001:3000"   # http://localhost:3001
      - "2222:22"     # ssh://localhost:2222 (Git over SSH)
    environment:
      - USER_UID=${PUID:-1000}
      - USER_GID=${PGID:-1000}
      # Database — connects to the shared Postgres instance
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgres:5432
      - FORGEJO__database__NAME=forgejo
      - FORGEJO__database__USER=forgejo
      - FORGEJO__database__PASSWD=${FORGEJO_DB_PASSWORD}
      # Cache — use Redis (database slot 0)
      - FORGEJO__cache__ENABLED=true
      - FORGEJO__cache__ADAPTER=redis
      - FORGEJO__cache__HOST=redis://redis:6379/0?pool_size=100&idle_timeout=180s
      # Session — use Redis (database slot 1 to isolate from cache)
      - FORGEJO__session__PROVIDER=redis
      - FORGEJO__session__PROVIDER_CONFIG=redis://redis:6379/1
      # Queue — use Redis (database slot 2)
      - FORGEJO__queue__TYPE=redis
      - FORGEJO__queue__CONN_STR=redis://redis:6379/2
    volumes:
      - forgejo-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - local-dev-net

# ── Qdrant: Vector Database ───────────────────────────────────────────────────
# High-performance vector similarity search engine. REST API on 6333,
# gRPC on 6334. Used by AnythingLLM and Open WebUI for embeddings storage.
# QDRANT_API_KEY is optional — leave blank in .env to disable auth for local dev.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: local-dev-qdrant
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "6333:6333"   # http://localhost:6333 (REST + Web UI)
      - "6334:6334"   # grpc://localhost:6334 (gRPC)
    environment:
      # Optional API key — set QDRANT_API_KEY in .env or leave empty for no auth
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - local-dev-net

# ── Meilisearch: Full-Text Search Engine ─────────────────────────────────────
# Fast search API with a web UI at /mini-dashboard. MEILI_MASTER_KEY is
# required in production mode to secure the API.
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: local-dev-meilisearch
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "7700:7700"   # http://localhost:7700 (API + mini-dashboard)
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_ENV=production
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - local-dev-net

# ── n8n: Workflow Automation ──────────────────────────────────────────────────
# Visual workflow builder. Configured to use Postgres as the backend database
# instead of the default SQLite, suitable for multi-user or persistent setups.
# WEBHOOK_URL must be reachable from the outside world for webhook triggers.
  n8n:
    image: n8nio/n8n:latest
    container_name: local-dev-n8n
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "5678:5678"   # http://localhost:5678
    environment:
      # Database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      # Server config
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # Webhook base URL — update to a public URL (e.g. ngrok) for external triggers
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${TZ:-America/Denver}
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - local-dev-net

# ── Dozzle: Real-Time Docker Log Viewer ──────────────────────────────────────
# Lightweight web UI for streaming Docker container logs. Mounts docker.sock
# read-only — no write access to the Docker daemon.
  dozzle:
    image: amir20/dozzle:latest
    container_name: local-dev-dozzle
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "8080:8080"   # http://localhost:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - local-dev-net

# ── Bytebase: Database DevOps Tool ───────────────────────────────────────────
# Schema migration and change management for databases. Requires Postgres for
# its own metadata store (PG_URL). Bytebase connects to MANAGE other databases
# (like Forgejo's or n8n's) — those are configured via the Bytebase web UI.
# The --data and --port flags are passed via command (not env vars).
  bytebase:
    image: bytebase/bytebase:latest
    container_name: local-dev-bytebase
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "8888:8080"   # http://localhost:8888
    environment:
      # Bytebase's own metadata store — uses the shared Postgres instance
      - PG_URL=postgresql://bytebase:${BYTEBASE_DB_PASSWORD}@postgres:5432/bytebase
    command: ["--data", "/var/opt/bytebase", "--port", "8080"]
    volumes:
      - bytebase-data:/var/opt/bytebase
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - local-dev-net

# ── Open WebUI: AI Chat Interface ────────────────────────────────────────────
# Browser-based chat interface compatible with Ollama and OpenAI APIs.
# Uses extra_hosts to bridge to an Ollama instance running on the Docker host.
# Change OLLAMA_BASE_URL in .env to override or disable Ollama integration.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: local-dev-open-webui
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "8081:8080"   # http://localhost:8081
    environment:
      # Points to Ollama on the Docker host — requires host.docker.internal support
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - WEBUI_SECRET_KEY=${OPEN_WEBUI_SECRET_KEY}
    extra_hosts:
      # Allow container to reach services on the Docker host machine
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui-data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - local-dev-net

# ── Activepieces: Automation Platform ────────────────────────────────────────
# Open-source Zapier alternative. AP_ENCRYPTION_KEY and AP_JWT_SECRET must
# each be exactly 32 hex characters (16 bytes). Generate with: openssl rand -hex 16
  activepieces:
    image: activepieces/activepieces:latest
    container_name: local-dev-activepieces
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "8082:80"     # http://localhost:8082
    environment:
      - AP_ENGINE_EXECUTABLE_PATH=dist/packages/engine/main.js
      # Postgres connection
      - AP_POSTGRES_HOST=postgres
      - AP_POSTGRES_PORT=5432
      - AP_POSTGRES_DATABASE=activepieces
      - AP_POSTGRES_USERNAME=activepieces
      - AP_POSTGRES_PASSWORD=${ACTIVEPIECES_DB_PASSWORD}
      # Redis connection
      - AP_REDIS_HOST=redis
      - AP_REDIS_PORT=6379
      # Security — must be exactly 32 hex chars each
      - AP_ENCRYPTION_KEY=${AP_ENCRYPTION_KEY}
      - AP_JWT_SECRET=${AP_JWT_SECRET}
      # Frontend URL — used for webhook callbacks and OAuth redirects
      - AP_FRONTEND_URL=http://localhost:8082
    volumes:
      - activepieces-data:/usr/src/app/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - local-dev-net

# ── CyberChef: Data Encoding / Decoding Toolkit ──────────────────────────────
# Stateless static web app — no volumes, no secrets, no database.
# Pure client-side JavaScript; all processing happens in the browser.
  cyberchef:
    image: mpepping/cyberchef:latest
    container_name: local-dev-cyberchef
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "8083:8000"   # http://localhost:8083
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - local-dev-net

# ── AnythingLLM: Self-Hosted LLM Workspace ────────────────────────────────────
# Multi-user LLM workspace supporting local models, OpenAI, and custom embeddings.
# AUTH_TOKEN is the password for the UI. JWT_SECRET signs session tokens.
# Uses its own SQLite database by default (stored in STORAGE_DIR).
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: local-dev-anythingllm
    restart: unless-stopped
    labels:
      - "xdong.stack=local-dev"
      - "xdong.category=full-stack"
    ports:
      - "3500:3001"   # http://localhost:3500
    environment:
      - STORAGE_DIR=/app/server/storage
      # Session signing secret — generate: openssl rand -base64 32
      - JWT_SECRET=${ANYTHINGLLM_JWT_SECRET}
      # UI password — set AUTH_TOKEN to empty string to disable auth
      - AUTH_TOKEN=${ANYTHINGLLM_PASSWORD}
      - UID=${PUID:-1000}
      - GID=${PGID:-1000}
    extra_hosts:
      # Allow AnythingLLM to reach Ollama on the Docker host
      - "host.docker.internal:host-gateway"
    volumes:
      - anythingllm-data:/app/server/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - local-dev-net

# =============================================================================
# Networks
# =============================================================================
networks:
  local-dev-net:
    name: local-dev-net
    driver: bridge

# =============================================================================
# Named Volumes — all persistence is managed here, never in bind mounts
# (except for homepage config and postgres init scripts which ship with the stack)
# =============================================================================
volumes:
  postgres-data:
  redis-data:
  code-server-data:
  forgejo-data:
  qdrant-data:
  meilisearch-data:
  n8n-data:
  bytebase-data:
  open-webui-data:
  activepieces-data:
  anythingllm-data:
  caddy-data:
  caddy-config:
