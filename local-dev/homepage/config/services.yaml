---
# Homepage service tiles — https://gethomepage.dev/configs/services/
# Each tile links to the service URL and shows live container status.
# The "server" and "container" keys wire up Docker status badges.

- Dev Tools:
    - Code-Server:
        icon: code.png
        href: http://localhost:8443
        description: VS Code in the browser
        server: my-server
        container: local-dev-code-server
